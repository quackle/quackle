# Continuous integration and pull request validation builds
name: CI builds
on:
  push:
    branches: [ master, actions_ci ]
  pull_request:
    branches: [ master, actions_ci ]

jobs:
  job:
    name: ${{ matrix.name }}-qt${{ matrix.qt_ver }}-build
    runs-on: ${{ matrix.os }}
    env: ${{ matrix.env }}

    strategy:
      fail-fast: false
      matrix:
        name: [macos-clang, ubuntu-22.04-clang, ubuntu-22.04-g++, ubuntu-24.04-clang, ubuntu-24.04-g++]
        qt_ver: [5.15.2, 6.2.*, 6.12.*]
        include:
          - name: macos-clang
            os: macos-latest
            env:
              CXX: clang++
              CC: clang
          - name: macos-clang
            qt_ver: 5.15.2
            # Qt 5.15.x's official macOS package is x86_64-only (Apple
            # Silicon support never shipped for Qt5), but macos-latest
            # runners are arm64. Force an x86_64 build for this combo only;
            # Rosetta 2 handles running it if ever needed.
            osx_arch: x86_64
          - name: ubuntu-22.04-clang
            os: ubuntu-22.04
            env:
              CXX: clang++
              CC: clang
          - name: ubuntu-22.04-g++
            os: ubuntu-22.04
            env:
              CXX: g++
              CC: gcc
          - name: ubuntu-24.04-clang
            os: ubuntu-24.04
            env:
              CXX: clang++
              CC: clang
          - name: ubuntu-24.04-g++
            os: ubuntu-24.04
            env:
              CXX: g++
              CC: gcc
          - name: windows-x64-vs22
            # 6.11.0+ (including 6.12.x) trips a bug in aqtinstall 3.3.0's
            # Windows package-path construction (it requests
            # qt6_NNNN/qt6_NNNN/Updates.xml instead of
            # qt6_NNNN/qt6_NNNN_msvc2022_64/Updates.xml, confirmed against
            # miurahr/aqtinstall#1007 and empirically here). 6.10.x is the
            # newest line confirmed to still install correctly.
            qt_ver: 6.10.*
            os: windows-latest
            msvc_arch: x64
            qt_arch: win64_msvc2022_64
            env:
              CXX: cl
              C: cl

    steps:
    - name: Check out sources
      uses: actions/checkout@v4

    - name: Get latest CMake and ninja
      uses: lukka/get-cmake@latest

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ matrix.qt_ver }}
        arch: ${{ matrix.qt_arch }}
        cache: true

    - name: Add MSVC to path
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.msvc_arch }}

    - name: Generate and build
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DQT_VERSION=${{ matrix.qt_ver }} -DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }} ../quacker
        ninja -v
