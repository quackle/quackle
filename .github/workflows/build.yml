# Continuous integration and pull request validation builds
name: CI builds
on:
  push:
    branches: [ master, actions_ci ]
  pull_request:
    branches: [ master, actions_ci ]

jobs:
  job:
    name: ${{ matrix.name }}-qt${{ matrix.qt_ver }}-build
    runs-on: ${{ matrix.os }}
    env: ${{ matrix.env }}

    strategy:
      fail-fast: false
      matrix:
        name: [macos-clang, ubuntu-22.04-clang, ubuntu-22.04-g++, ubuntu-24.04-clang, ubuntu-24.04-g++]
        qt_ver: [5.15.2, 6.2.*, 6.12.*]
        include:
          - name: macos-clang
            os: macos-latest
            env:
              CXX: clang++
              CC: clang
          - name: macos-clang
            qt_ver: 5.15.2
            # Qt 5.15.x's official macOS package is x86_64-only (Apple
            # Silicon support never shipped for Qt5), but macos-latest
            # runners are arm64. Force an x86_64 build for this combo only;
            # Rosetta 2 handles running it if ever needed.
            osx_arch: x86_64
          - name: ubuntu-22.04-clang
            os: ubuntu-22.04
            env:
              CXX: clang++
              CC: clang
          - name: ubuntu-22.04-g++
            os: ubuntu-22.04
            env:
              CXX: g++
              CC: gcc
          - name: ubuntu-24.04-clang
            os: ubuntu-24.04
            env:
              CXX: clang++
              CC: clang
          - name: ubuntu-24.04-g++
            os: ubuntu-24.04
            env:
              CXX: g++
              CC: gcc
          - name: windows-x64-vs22
            # 6.11.0+ (including 6.12.x) trips a bug in aqtinstall 3.3.0's
            # Windows package-path construction (it requests
            # qt6_NNNN/qt6_NNNN/Updates.xml instead of
            # qt6_NNNN/qt6_NNNN_msvc2022_64/Updates.xml, confirmed against
            # miurahr/aqtinstall#1007 and empirically here). 6.10.x is the
            # newest line confirmed to still install correctly.
            qt_ver: 6.10.*
            os: windows-latest
            msvc_arch: x64
            qt_arch: win64_msvc2022_64
            env:
              CXX: cl
              C: cl
          - name: windows-arm64-vs22
            # Native Windows-on-ARM build on GitHub's arm64 runner. On this host
            # aqtinstall's target is windows_arm64, which serves a native arm64
            # Qt (win64_msvc2022_arm64, native host tools) -- so this is a plain
            # native build like the x64 job, not a cross-compile. Qt has offered
            # these arm64 binaries only since 6.8; pinning 6.10.* keeps us in
            # step with the x64 job (whose ceiling is the aqtinstall bug above).
            qt_ver: 6.10.*
            os: windows-11-arm
            msvc_arch: arm64
            qt_arch: win64_msvc2022_arm64
            env:
              CXX: cl
              C: cl

    steps:
    - name: Check out sources
      uses: actions/checkout@v4

    - name: Get latest CMake and ninja
      uses: lukka/get-cmake@latest

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ matrix.qt_ver }}
        arch: ${{ matrix.qt_arch }}
        cache: true

    - name: Add MSVC to path
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.msvc_arch }}

    - name: Generate and build
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DQT_VERSION=${{ matrix.qt_ver }} -DCMAKE_OSX_ARCHITECTURES=${{ matrix.osx_arch }} ../quacker
        ninja -v

    # Drives libquackle_test (and makegaddag) out of the build tree above,
    # comparing against the goldens in test/regression/suites. See
    # test/regression/README.md.
    - name: Run regression tests
      shell: bash
      run: |
        # libquackle_test links Qt Core; ensure aqtinstall's Qt is on path
        if [ -n "$QT_ROOT_DIR" ]; then
          export LD_LIBRARY_PATH="$QT_ROOT_DIR/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}"
          export DYLD_FRAMEWORK_PATH="$QT_ROOT_DIR/lib${DYLD_FRAMEWORK_PATH:+:$DYLD_FRAMEWORK_PATH}"
        fi
        # Git Bash on the Windows runners exposes the toolcache Python as
        # `python`; everywhere else it's `python3`.
        PY=python3
        command -v "$PY" >/dev/null 2>&1 || PY=python
        "$PY" test/regression/run_regression.py --bin build

  # Linux ARM64 (Raspberry Pi) builds. Unlike the matrix above, these do NOT use
  # aqtinstall: Qt has no ARM64 Linux desktop binaries before 6.7, and real Pi
  # users build against the system Qt from apt anyway. So we install Qt (and the
  # rest of the toolchain) via the distro package manager inside a container that
  # matches an actual Pi userland, running on GitHub's native aarch64 runners.
  # The distro decides the Qt version; we deliberately don't pin one.
  #
  # aarch64 only: hosted ARM64 runners cover 64-bit Raspberry Pi OS / Ubuntu
  # (Pi 3/4/5, Zero 2 W). 32-bit armhf has no hosted runner and is not tested.
  raspi:
    name: ${{ matrix.label }}-build
    runs-on: ubuntu-24.04-arm
    container: ${{ matrix.container }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: raspios-bookworm-qt5
            container: debian:bookworm
            qt_version: 5
            qt_pkgs: qtbase5-dev
          - label: raspios-bookworm-qt6
            container: debian:bookworm
            qt_version: 6
            qt_pkgs: qt6-base-dev qt6-base-dev-tools
          - label: ubuntu-22.04-arm-qt5
            container: ubuntu:22.04
            qt_version: 5
            qt_pkgs: qtbase5-dev
          - label: ubuntu-22.04-arm-qt6
            container: ubuntu:22.04
            qt_version: 6
            qt_pkgs: qt6-base-dev qt6-base-dev-tools
          - label: ubuntu-24.04-arm-qt6
            container: ubuntu:24.04
            qt_version: 6
            qt_pkgs: qt6-base-dev qt6-base-dev-tools

    steps:
    # Install everything from apt, exactly as a Raspberry Pi user would (no
    # aqtinstall). git/ca-certificates let actions/checkout clone inside the
    # otherwise-minimal container. libgl1-mesa-dev supplies the GL headers that
    # Qt6's WrapOpenGL dependency needs at configure time -- Ubuntu 22.04's
    # qt6-base-dev (Qt 6.2) doesn't pull them in, unlike the Qt5 and Qt 6.4 pkgs.
    - name: Install build dependencies
      run: |
        apt-get update
        apt-get install -y --no-install-recommends \
          build-essential cmake ninja-build git ca-certificates libgl1-mesa-dev \
          python3 \
          ${{ matrix.qt_pkgs }}

    - name: Check out sources
      uses: actions/checkout@v4

    - name: Generate and build
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DCMAKE_BUILD_TYPE=Release -DQT_VERSION=${{ matrix.qt_version }} ../quacker
        ninja -v

    - name: Run regression tests
      run: python3 test/regression/run_regression.py --bin build
