# Continuous integration and pull request validation builds
name: CI builds
on:
  push:
    branches: [ master, actions_ci ]
  pull_request:
    branches: [ master, actions_ci ]

jobs:
  job:
    name: ${{ matrix.name }}-build
    runs-on: ${{ matrix.os }}
    env: ${{ matrix.env }}

    strategy:
      fail-fast: false
      matrix:
        name: [macos-clang, ubuntu-22.04-clang, ubuntu-22.04-g++, ubuntu-24.04-clang, ubuntu-24.04-g++]
        qt_ver: [5.15.2, 6.2.*, 6.12.*]
        include:
          - name: macos-clang
            os: macos-latest
            env:
              CXX: clang++
              CC: clang
          - name: ubuntu-22.04-clang
            os: ubuntu-22.04
            env:
              CXX: clang++
              CC: clang
          - name: ubuntu-22.04-g++
            os: ubuntu-22.04
            env:
              CXX: g++
              CC: gcc
          - name: ubuntu-24.04-clang
            os: ubuntu-24.04
            env:
              CXX: clang++
              CC: clang
          - name: ubuntu-24.04-g++
            os: ubuntu-24.04
            env:
              CXX: g++
              CC: gcc
          - name: windows-x64-vs22-qt-6.12.*
            qt_ver: 6.12.*
            os: windows-latest
            msvc_arch: x64
            qt_arch: win64_msvc2022_64
            env:
              CXX: cl
              C: cl

    steps:
    - name: Check out sources
      uses: actions/checkout@v4

    - name: Get latest CMake and ninja
      uses: lukka/get-cmake@latest

    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: ${{ matrix.qt_ver }}
        arch: ${{ matrix.qt_arch }}
        cache: true

    - name: Add MSVC to path
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: ${{ matrix.msvc_arch }}

    - name: Generate and build
      run: |
        mkdir build
        cd build
        cmake -G Ninja -DQT_VERSION=${{ matrix.qt_ver }} ../quacker
        ninja -v
